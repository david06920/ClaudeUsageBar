name: ClaudeUsageBar
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "RDT6KRUG9A"
targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsageBar
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidrensmann.claudeusagebar
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    entitlements:
      path: ClaudeUsageBar/ClaudeUsageBar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.davidrensmann.claudeusagebar
    dependencies:
      - target: ClaudeUsageBarWidgetExtension
        embed: true
        codeSign: true

  ClaudeUsageBarWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClaudeUsageBarWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidrensmann.claudeusagebar.widget
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Usage"
        PRODUCT_NAME: "$(TARGET_NAME)"
    info:
      path: ClaudeUsageBarWidget/Info.plist
      properties:
        CFBundleDisplayName: "Claude Usage"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ClaudeUsageBarWidget/ClaudeUsageBarWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.davidrensmann.claudeusagebar

schemes:
  ClaudeUsageBar:
    build:
      targets:
        ClaudeUsageBar: all
        ClaudeUsageBarWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
